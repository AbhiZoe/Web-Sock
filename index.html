<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍆 Gutthi Vankaaya 🥬</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a2e1a;
      color: #f0f5e8;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "🍆🥦🌽🥕🌶️🥬🍅🥒🧄🧅";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: 40px;
      opacity: 0.06;
      word-spacing: 30px;
      line-height: 80px;
      letter-spacing: 20px;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      word-break: break-all;
    }

    #login-screen, #chat-screen {
      position: relative;
      z-index: 1;
    }

    #login-screen {
      background: #2d4a2d;
      padding: 40px;
      border-radius: 16px;
      width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      position: relative;
    }

    #login-screen h1 {
      margin-bottom: 24px;
      font-size: 24px;
      color: #c8e6c9;
    }

    .veggie-banner {
      font-size: 32px;
      margin-bottom: 16px;
      letter-spacing: 8px;
    }

    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 14px;
      border: none;
      border-radius: 8px;
      background: #1b3a1b;
      color: #f0f5e8;
      font-size: 15px;
      outline: none;
    }

    #login-screen input::placeholder { color: #666; }

    #login-screen button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #388e3c;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background .2s;
    }

    #login-screen button:hover { background: #2e7d32; }

    #login-error {
      color: #ff6b6b;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }

    #chat-screen {
      display: none;
      flex-direction: column;
      width: 480px;
      max-width: 100%;
      height: 90vh;
      background: #2d4a2d;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #4a7a4a; border-radius: 3px; }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .msg .sender {
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .msg .time {
      font-size: 11px;
      margin-top: 4px;
      opacity: .5;
      text-align: right;
    }

    .msg.own {
      align-self: flex-end;
      background: #388e3c;
      border-bottom-right-radius: 2px;
    }

    .msg.other {
      align-self: flex-start;
      background: #3e5c3e;
      border-bottom-left-radius: 2px;
    }

    #typing-indicator {
      padding: 4px 16px 8px;
      font-size: 13px;
      color: #a5d6a7;
      font-style: italic;
      min-height: 24px;
    }

    #input-bar {
      display: flex;
      padding: 12px;
      gap: 10px;
      background: #1b3a1b;
      border-top: 1px solid #388e3c;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2d4a2d;
      color: #f0f5e8;
      font-size: 15px;
      outline: none;
    }

    #msg-input::placeholder { color: #555; }

    #send-btn, #mic-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #388e3c;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: background .2s;
    }

    #send-btn:hover, #mic-btn:hover { background: #2e7d32; }

    #mic-btn {
      border-radius: 50%;
      width: 44px;
      height: 44px;
      padding: 0;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #mic-btn.recording {
      background: #e74c3c;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }

    #recording-bar {
      display: none;
      padding: 10px 16px;
      background: #1b3a1b;
      align-items: center;
      gap: 12px;
      border-top: 1px solid #388e3c;
    }

    #recording-bar .rec-dot {
      width: 10px;
      height: 10px;
      background: #e74c3c;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }

    #recording-bar .rec-timer {
      font-size: 14px;
      color: #e74c3c;
      font-weight: 600;
      min-width: 40px;
    }

    #recording-bar .rec-slide {
      flex: 1;
      text-align: center;
      color: #888;
      font-size: 13px;
    }

    #recording-bar .rec-cancel {
      background: none;
      border: none;
      color: #ff6b6b;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .voice-msg {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 200px;
      margin-top: 4px;
    }

    .voice-msg .vn-play {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #1b3a1b;
      color: #a5d6a7;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .msg.own .voice-msg .vn-play { background: rgba(0,0,0,.2); }

    .voice-msg .vn-track {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .voice-msg .vn-progress {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,.15);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }

    .voice-msg .vn-progress-fill {
      height: 100%;
      background: #a5d6a7;
      width: 0%;
      border-radius: 2px;
      transition: width .1s linear;
    }

    .voice-msg .vn-duration {
      font-size: 11px;
      opacity: .6;
    }

    .voice-msg .vn-waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 20px;
    }

    .voice-msg .vn-waveform .bar {
      width: 3px;
      background: rgba(255,255,255,.3);
      border-radius: 2px;
    }

    .msg.own .voice-msg .vn-waveform .bar { background: rgba(255,255,255,.4); }

    .msg .reply-btn {
      font-size: 11px;
      color: #a5d6a7;
      cursor: pointer;
      margin-top: 4px;
      opacity: 0;
      transition: opacity .2s;
    }

    .msg:hover .reply-btn { opacity: 1; }

    .msg .reply-quote {
      background: rgba(0,0,0,.2);
      border-left: 3px solid #a5d6a7;
      padding: 4px 8px;
      margin-bottom: 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .msg .reply-quote .reply-name {
      font-weight: 700;
      color: #a5d6a7;
      font-size: 11px;
    }

    .msg .reply-quote .reply-text {
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    #reply-preview {
      display: none;
      padding: 8px 16px;
      background: #1b3a1b;
      border-left: 3px solid #a5d6a7;
      font-size: 13px;
      color: #c8e6c9;
      align-items: center;
      justify-content: space-between;
    }

    #reply-preview .reply-info {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex: 1;
    }

    #reply-preview .reply-info strong { color: #a5d6a7; }

    #reply-cancel {
      background: none;
      border: none;
      color: #ff6b6b;
      font-size: 18px;
      cursor: pointer;
      margin-left: 10px;
    }

    #chat-header {
      padding: 16px 20px;
      background: #1b3a1b;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #388e3c;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #call-btn {
      background: #388e3c;
      border: none;
      color: #fff;
      font-size: 20px;
      padding: 6px 14px;
      border-radius: 50%;
      cursor: pointer;
      transition: background .2s;
    }

    #call-btn:hover { background: #2e7d32; }

    #call-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #call-box {
      background: #2d4a2d;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      min-width: 300px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }

    #call-box .call-icon {
      font-size: 60px;
      margin-bottom: 16px;
    }

    #call-box .call-status {
      font-size: 16px;
      color: #c8e6c9;
      margin-bottom: 8px;
    }

    #call-box .call-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
    }

    #call-box .call-timer {
      font-size: 14px;
      color: #a5d6a7;
      margin-bottom: 20px;
      display: none;
    }

    .call-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .call-buttons button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: transform .15s;
    }

    .call-buttons button:hover { transform: scale(1.1); }

    .btn-accept { background: #388e3c; color: #fff; }
    .btn-reject, .btn-end { background: #e74c3c; color: #fff; }
    .btn-mute { background: #555; color: #fff; }
    .btn-mute.muted { background: #ff9800; }

    @media (max-width: 520px) {
      #chat-screen { width: 100%; height: 100vh; border-radius: 0; }
      #login-screen { width: 90%; }
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="veggie-banner">🥦🍆🌽🥕🌶️</div>
    <h1>🍆 Gutthi Vankaaya 🥬</h1>
    <input type="text" id="username" placeholder="🧑 Your Name" autocomplete="off">
    <input type="password" id="accesscode" placeholder="🔑 Access Code" autocomplete="off">
    <button onclick="login()">🌿 Enter Chat</button>
    <p id="login-error">Invalid Code</p>
  </div>

  <div id="call-overlay">
    <div id="call-box">
      <div class="call-icon">📞</div>
      <div class="call-status" id="call-status">Calling...</div>
      <div class="call-name" id="call-name"></div>
      <div class="call-timer" id="call-timer">00:00</div>
      <div class="call-buttons" id="call-buttons"></div>
    </div>
  </div>

  <div id="chat-screen">
    <div id="chat-header">
      <span id="chat-header-text">Chat</span>
      <button id="call-btn" onclick="startCall()">📞</button>
    </div>
    <div id="messages"></div>
    <div id="typing-indicator"></div>
    <div id="recording-bar">
      <div class="rec-dot"></div>
      <div class="rec-timer" id="rec-timer">0:00</div>
      <div class="rec-slide">◄ Slide to cancel</div>
      <button class="rec-cancel" onclick="cancelRecording()">✕</button>
    </div>
    <div id="reply-preview">
      <div class="reply-info">Replying to <strong id="reply-to-name"></strong>: <span id="reply-to-text"></span></div>
      <button id="reply-cancel" onclick="cancelReply()">✕</button>
    </div>
    <div id="input-bar">
      <input type="text" id="msg-input" placeholder="🥒 Type a message..." autocomplete="off">
      <button id="send-btn" onclick="sendMessage()">🌽 Send</button>
      <button id="mic-btn">🎙️</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBCiAgS5OyDxxCfctPn41oMyBMHD3vof2Y",
      authDomain: "websock-8754c.firebaseapp.com",
      databaseURL: "https://websock-8754c-default-rtdb.firebaseio.com",
      projectId: "websock-8754c",
      storageBucket: "websock-8754c.firebasestorage.app",
      messagingSenderId: "795195450874",
      appId: "1:795195450874:web:6d3a2d61ef375cbdfff043",
      measurementId: "G-E6GGVD0X2S"
    };

    if (firebaseConfig.apiKey === "YOUR_API_KEY" || !firebaseConfig.databaseURL || firebaseConfig.databaseURL.includes("YOUR_PROJECT")) {
      console.error("Firebase config is still placeholder! Replace it with your real config.");
      alert("Firebase is not configured. Open index.html and paste your Firebase config.");
    }

    try {
      firebase.initializeApp(firebaseConfig);
      console.log("Firebase initialized successfully.");
    } catch (err) {
      console.error("Firebase initialization failed:", err);
    }

    const db = firebase.database();
    const storage = firebase.storage();
    const messagesRef = db.ref("messages");
    const typingRef = db.ref("typing");
    const callsRef = db.ref("calls");

    const ACCESS_CODE = "ECHO123";

    let currentUser = "";
    let typingTimeout = null;
    let replyingTo = null;

    function login() {
      const name = document.getElementById("username").value.trim();
      const code = document.getElementById("accesscode").value.trim();
      const error = document.getElementById("login-error");

      if (!name) {
        error.textContent = "Please enter your name";
        error.style.display = "block";
        return;
      }

      if (code !== ACCESS_CODE) {
        error.textContent = "Invalid Code";
        error.style.display = "block";
        return;
      }

      currentUser = name;
      console.log("Logged in as:", currentUser);
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      document.getElementById("chat-header-text").textContent = "🍆 Gutthi Vankaaya — " + currentUser + " 🥬";
      document.getElementById("msg-input").focus();

      listenForMessages();
      listenForTyping();
      listenForCalls();

      document.getElementById("msg-input").addEventListener("input", function () {
        typingRef.child(currentUser).set(true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(function () {
          typingRef.child(currentUser).set(false);
        }, 1500);
      });

      window.addEventListener("beforeunload", function () {
        typingRef.child(currentUser).set(false);
      });
    }

    document.getElementById("accesscode").addEventListener("keydown", function (e) {
      if (e.key === "Enter") login();
    });

    function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text) return;

      const msgData = {
        name: currentUser,
        text: text,
        timestamp: Date.now()
      };

      if (replyingTo) {
        msgData.replyTo = {
          name: replyingTo.name,
          text: replyingTo.text || "🎙️ Voice note"
        };
        cancelReply();
      }

      typingRef.child(currentUser).set(false);
      clearTimeout(typingTimeout);

      messagesRef.push(msgData)
        .then(function () {
          console.log("Message sent successfully.");
        })
        .catch(function (err) {
          console.error("Failed to send message:", err);
          alert("Failed to send message. Check console for details.");
        });

      input.value = "";
      input.focus();
    }

    function setReply(name, text) {
      replyingTo = { name: name, text: text };
      document.getElementById("reply-to-name").textContent = name;
      document.getElementById("reply-to-text").textContent = text || "🎙️ Voice note";
      document.getElementById("reply-preview").style.display = "flex";
      document.getElementById("msg-input").focus();
    }

    function cancelReply() {
      replyingTo = null;
      document.getElementById("reply-preview").style.display = "none";
    }

    document.getElementById("msg-input").addEventListener("keydown", function (e) {
      if (e.key === "Enter") sendMessage();
    });

    function listenForMessages() {
      messagesRef.orderByChild("timestamp").on("value",
        function (snapshot) {
          const container = document.getElementById("messages");
          container.innerHTML = "";

          if (!snapshot.exists()) return;

          snapshot.forEach(function (child) {
            const msg = child.val();
            if (!msg || !msg.name) return;
            if (!msg.text && !msg.audio) return;

            const isOwn = msg.name === currentUser;

            const div = document.createElement("div");
            div.className = "msg " + (isOwn ? "own" : "other");

            const sender = document.createElement("div");
            sender.className = "sender";
            sender.textContent = msg.name;
            div.appendChild(sender);

            if (msg.replyTo) {
              const quote = document.createElement("div");
              quote.className = "reply-quote";
              const rName = document.createElement("div");
              rName.className = "reply-name";
              rName.textContent = msg.replyTo.name;
              const rText = document.createElement("div");
              rText.className = "reply-text";
              rText.textContent = msg.replyTo.text;
              quote.appendChild(rName);
              quote.appendChild(rText);
              div.appendChild(quote);
            }

            if (msg.audio) {
              var player = createVoicePlayer(msg.audio, msg.duration || 0);
              div.appendChild(player);
            } else {
              const body = document.createElement("div");
              body.textContent = msg.text;
              div.appendChild(body);
            }

            const time = document.createElement("div");
            time.className = "time";
            time.textContent = new Date(msg.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit"
            });

            div.appendChild(time);

            const replyBtn = document.createElement("div");
            replyBtn.className = "reply-btn";
            replyBtn.textContent = "↩ Reply";
            replyBtn.onclick = (function (m) {
              return function () { setReply(m.name, m.text || ""); };
            })(msg);
            div.appendChild(replyBtn);

            container.appendChild(div);
          });

          container.scrollTop = container.scrollHeight;
        },
        function (err) {
          console.error("Firebase listener error:", err);
        }
      );
    }

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let recTimerInterval = null;
    let recSeconds = 0;
    let recCancelled = false;
    let micStartX = 0;

    (function setupMicButton() {
      var mic = document.getElementById("mic-btn");

      mic.addEventListener("mousedown", function (e) { micDown(e.clientX); });
      mic.addEventListener("touchstart", function (e) {
        e.preventDefault();
        micDown(e.touches[0].clientX);
      }, { passive: false });

      document.addEventListener("mouseup", function () { if (isRecording) micUp(); });
      document.addEventListener("touchend", function () { if (isRecording) micUp(); });

      document.addEventListener("mousemove", function (e) { if (isRecording) micMove(e.clientX); });
      document.addEventListener("touchmove", function (e) { if (isRecording) micMove(e.touches[0].clientX); });
    })();

    function micDown(x) {
      micStartX = x;
      recCancelled = false;
      startRecording();
    }

    function micUp() {
      if (recCancelled) {
        cancelRecording();
      } else {
        stopAndSendRecording();
      }
    }

    function micMove(x) {
      var diff = micStartX - x;
      if (diff > 100) {
        recCancelled = true;
        document.querySelector(".rec-slide").textContent = "🗑️ Release to cancel";
        document.querySelector(".rec-slide").style.color = "#ff6b6b";
      } else {
        recCancelled = false;
        document.querySelector(".rec-slide").textContent = "◄ Slide to cancel";
        document.querySelector(".rec-slide").style.color = "#888";
      }
    }

    var shouldSendVoice = false;

    function startRecording() {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function (stream) {
          audioChunks = [];
          shouldSendVoice = false;
          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) {
              audioChunks.push(e.data);
            }
          };

          mediaRecorder.onstop = function () {
            stream.getTracks().forEach(function (track) { track.stop(); });

            if (shouldSendVoice && audioChunks.length > 0) {
              var blob = new Blob(audioChunks, { type: "audio/webm" });
              var duration = recSeconds;
              uploadVoiceNote(blob, duration);
            }

            audioChunks = [];
            resetRecUI();
          };

          mediaRecorder.start(100);
          isRecording = true;
          recSeconds = 0;

          document.getElementById("mic-btn").classList.add("recording");
          document.getElementById("recording-bar").style.display = "flex";
          document.getElementById("input-bar").style.display = "none";

          recTimerInterval = setInterval(function () {
            recSeconds++;
            var m = Math.floor(recSeconds / 60);
            var s = String(recSeconds % 60).padStart(2, "0");
            document.getElementById("rec-timer").textContent = m + ":" + s;
          }, 1000);
        })
        .catch(function (err) {
          console.error("Microphone access denied:", err);
          alert("Microphone permission is required to send voice notes.");
        });
    }

    function stopAndSendRecording() {
      if (!mediaRecorder || mediaRecorder.state === "inactive") { resetRecUI(); return; }
      shouldSendVoice = true;
      isRecording = false;
      mediaRecorder.stop();
    }

    function cancelRecording() {
      if (!mediaRecorder || mediaRecorder.state === "inactive") { resetRecUI(); return; }
      shouldSendVoice = false;
      isRecording = false;
      mediaRecorder.stop();
    }

    function resetRecUI() {
      clearInterval(recTimerInterval);
      document.getElementById("mic-btn").classList.remove("recording");
      document.getElementById("recording-bar").style.display = "none";
      document.getElementById("input-bar").style.display = "flex";
      document.getElementById("rec-timer").textContent = "0:00";
      document.querySelector(".rec-slide").textContent = "◄ Slide to cancel";
      document.querySelector(".rec-slide").style.color = "#888";
      recCancelled = false;
    }

    function uploadVoiceNote(blob, duration) {
      var fileName = "voice_" + Date.now() + ".webm";
      var storageRef = storage.ref("voiceNotes/" + fileName);

      storageRef.put(blob)
        .then(function (snapshot) {
          return snapshot.ref.getDownloadURL();
        })
        .then(function (downloadURL) {
          messagesRef.push({
            name: currentUser,
            audio: downloadURL,
            duration: duration || 0,
            timestamp: Date.now()
          });
        })
        .catch(function (err) {
          console.error("Voice note upload failed:", err);
          alert("Failed to upload voice note.");
        });
    }

    function formatDuration(sec) {
      var m = Math.floor(sec / 60);
      var s = String(Math.floor(sec) % 60).padStart(2, "0");
      return m + ":" + s;
    }

    function generateWaveformBars() {
      var bars = "";
      for (var i = 0; i < 20; i++) {
        var h = Math.floor(Math.random() * 14) + 4;
        bars += '<div class="bar" style="height:' + h + 'px"></div>';
      }
      return bars;
    }

    function createVoicePlayer(src, duration) {
      var wrapper = document.createElement("div");
      wrapper.className = "voice-msg";

      var audio = new Audio(src);
      var playing = false;

      var playBtn = document.createElement("button");
      playBtn.className = "vn-play";
      playBtn.textContent = "▶";

      var track = document.createElement("div");
      track.className = "vn-track";

      var waveform = document.createElement("div");
      waveform.className = "vn-waveform";
      waveform.innerHTML = generateWaveformBars();

      var progress = document.createElement("div");
      progress.className = "vn-progress";
      var progressFill = document.createElement("div");
      progressFill.className = "vn-progress-fill";
      progress.appendChild(progressFill);

      var dur = document.createElement("div");
      dur.className = "vn-duration";
      dur.textContent = formatDuration(duration || 0);

      playBtn.onclick = function () {
        if (playing) {
          audio.pause();
          playBtn.textContent = "▶";
          playing = false;
        } else {
          document.querySelectorAll(".vn-play").forEach(function (btn) {
            if (btn !== playBtn) { btn.textContent = "▶"; }
          });
          document.querySelectorAll("audio").forEach(function (a) {
            if (a !== audio) { a.pause(); a.currentTime = 0; }
          });
          audio.play();
          playBtn.textContent = "⏸";
          playing = true;
        }
      };

      audio.addEventListener("timeupdate", function () {
        if (audio.duration) {
          var pct = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = pct + "%";
          dur.textContent = formatDuration(audio.currentTime);
        }
      });

      audio.addEventListener("ended", function () {
        playBtn.textContent = "▶";
        playing = false;
        progressFill.style.width = "0%";
        dur.textContent = formatDuration(duration || audio.duration || 0);
      });

      audio.addEventListener("loadedmetadata", function () {
        if (!duration) dur.textContent = formatDuration(audio.duration);
      });

      progress.onclick = function (e) {
        if (audio.duration) {
          var rect = progress.getBoundingClientRect();
          var pct = (e.clientX - rect.left) / rect.width;
          audio.currentTime = pct * audio.duration;
        }
      };

      track.appendChild(waveform);
      track.appendChild(progress);
      track.appendChild(dur);
      wrapper.appendChild(playBtn);
      wrapper.appendChild(track);

      return wrapper;
    }

    function listenForTyping() {
      typingRef.on("value", function (snapshot) {
        const typingDiv = document.getElementById("typing-indicator");
        const typers = [];

        snapshot.forEach(function (child) {
          if (child.key !== currentUser && child.val() === true) {
            typers.push(child.key);
          }
        });

        if (typers.length > 0) {
          typingDiv.textContent = typers.join(", ") + (typers.length === 1 ? " is typing..." : " are typing...");
        } else {
          typingDiv.textContent = "";
        }
      });
    }

    // ===================== VOICE CALL (WebRTC + Firebase Signaling) =====================

    let peerConnection = null;
    let localStream = null;
    let callId = null;
    let isCaller = false;
    let isMuted = false;
    let callTimerInterval = null;
    let callSeconds = 0;

    const rtcConfig = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    };

    function showCallUI(status, name, buttons) {
      document.getElementById("call-overlay").style.display = "flex";
      document.getElementById("call-status").textContent = status;
      document.getElementById("call-name").textContent = name;
      document.getElementById("call-buttons").innerHTML = buttons;
    }

    function hideCallUI() {
      document.getElementById("call-overlay").style.display = "none";
      document.getElementById("call-timer").style.display = "none";
      document.getElementById("call-timer").textContent = "00:00";
      clearInterval(callTimerInterval);
      callSeconds = 0;
    }

    function startCallTimer() {
      callSeconds = 0;
      var timerEl = document.getElementById("call-timer");
      timerEl.style.display = "block";
      callTimerInterval = setInterval(function () {
        callSeconds++;
        var m = String(Math.floor(callSeconds / 60)).padStart(2, "0");
        var s = String(callSeconds % 60).padStart(2, "0");
        timerEl.textContent = m + ":" + s;
      }, 1000);
    }

    function startCall() {
      isCaller = true;
      callId = currentUser + "_" + Date.now();

      showCallUI("📞 Calling...", "",
        '<button class="btn-end" onclick="endCall()">📕</button>'
      );

      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function (stream) {
          localStream = stream;
          createPeerConnection();

          stream.getTracks().forEach(function (track) {
            peerConnection.addTrack(track, stream);
          });

          return peerConnection.createOffer();
        })
        .then(function (offer) {
          return peerConnection.setLocalDescription(offer);
        })
        .then(function () {
          callsRef.child(callId).set({
            caller: currentUser,
            status: "ringing",
            offer: JSON.stringify(peerConnection.localDescription),
            timestamp: Date.now()
          });

          callsRef.child(callId).on("value", function (snap) {
            var data = snap.val();
            if (!data) { endCall(); return; }

            if (data.answer && !peerConnection.currentRemoteDescription) {
              var answer = JSON.parse(data.answer);
              peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
              document.getElementById("call-status").textContent = "🟢 Connected";
              document.getElementById("call-name").textContent = "In call";
              document.getElementById("call-buttons").innerHTML =
                '<button class="btn-mute" id="mute-btn" onclick="toggleMute()">🔇</button>' +
                '<button class="btn-end" onclick="endCall()">📕</button>';
              startCallTimer();
            }

            if (data.status === "rejected" || data.status === "ended") {
              endCall();
            }
          });

          callsRef.child(callId).child("callerCandidates").on("child_added", function () {});
        })
        .catch(function (err) {
          console.error("Call failed:", err);
          alert("Microphone permission is required for voice calls.");
          hideCallUI();
        });
    }

    function answerCall(id) {
      callId = id;
      isCaller = false;

      showCallUI("🟢 Connecting...", "",
        '<button class="btn-end" onclick="endCall()">📕</button>'
      );

      callsRef.child(callId).once("value").then(function (snap) {
        var data = snap.val();
        if (!data || !data.offer) { endCall(); return; }

        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(function (stream) {
            localStream = stream;
            createPeerConnection();

            stream.getTracks().forEach(function (track) {
              peerConnection.addTrack(track, stream);
            });

            var offer = JSON.parse(data.offer);
            return peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
          })
          .then(function () {
            return peerConnection.createAnswer();
          })
          .then(function (answer) {
            return peerConnection.setLocalDescription(answer);
          })
          .then(function () {
            callsRef.child(callId).update({
              answer: JSON.stringify(peerConnection.localDescription),
              status: "connected"
            });

            document.getElementById("call-status").textContent = "🟢 Connected";
            document.getElementById("call-name").textContent = "In call with " + data.caller;
            document.getElementById("call-buttons").innerHTML =
              '<button class="btn-mute" id="mute-btn" onclick="toggleMute()">🔇</button>' +
              '<button class="btn-end" onclick="endCall()">📕</button>';
            startCallTimer();

            callsRef.child(callId).on("value", function (s) {
              var d = s.val();
              if (!d || d.status === "ended") { endCall(); }
            });
          })
          .catch(function (err) {
            console.error("Answer failed:", err);
            alert("Microphone permission is required for voice calls.");
            hideCallUI();
          });
      });
    }

    function createPeerConnection() {
      peerConnection = new RTCPeerConnection(rtcConfig);

      peerConnection.onicecandidate = function (e) {
        if (e.candidate && callId) {
          var node = isCaller ? "callerCandidates" : "answerCandidates";
          callsRef.child(callId).child(node).push(JSON.stringify(e.candidate));
        }
      };

      var remoteNode = isCaller ? "answerCandidates" : "callerCandidates";
      callsRef.child(callId).child(remoteNode).on("child_added", function (snap) {
        var candidate = JSON.parse(snap.val());
        peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(function () {});
      });

      peerConnection.ontrack = function (e) {
        var remoteAudio = document.createElement("audio");
        remoteAudio.srcObject = e.streams[0];
        remoteAudio.autoplay = true;
        remoteAudio.id = "remote-audio";
        document.body.appendChild(remoteAudio);
      };

      peerConnection.onconnectionstatechange = function () {
        if (peerConnection.connectionState === "disconnected" || peerConnection.connectionState === "failed") {
          endCall();
        }
      };
    }

    function endCall() {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }

      if (localStream) {
        localStream.getTracks().forEach(function (track) { track.stop(); });
        localStream = null;
      }

      var remoteAudio = document.getElementById("remote-audio");
      if (remoteAudio) remoteAudio.remove();

      if (callId) {
        callsRef.child(callId).update({ status: "ended" });
        callsRef.child(callId).off();
        callsRef.child(callId).child("callerCandidates").off();
        callsRef.child(callId).child("answerCandidates").off();
        callId = null;
      }

      isCaller = false;
      isMuted = false;
      hideCallUI();
    }

    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks().forEach(function (track) {
        track.enabled = !isMuted;
      });
      var btn = document.getElementById("mute-btn");
      btn.textContent = isMuted ? "🔊" : "🔇";
      btn.classList.toggle("muted", isMuted);
    }

    function rejectCall(id) {
      callsRef.child(id).update({ status: "rejected" });
    }

    function listenForCalls() {
      callsRef.orderByChild("status").equalTo("ringing").on("child_added", function (snap) {
        var data = snap.val();
        if (!data || data.caller === currentUser) return;
        if (callId) return;

        showCallUI("📲 Incoming call...", data.caller,
          '<button class="btn-accept" onclick="answerCall(\'' + snap.key + '\')">📞</button>' +
          '<button class="btn-reject" onclick="rejectCall(\'' + snap.key + '\');hideCallUI()">📕</button>'
        );
      });
    }

    window.addEventListener("beforeunload", function () {
      if (callId) endCall();
    });
  </script>
</body>
</html>
