<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Chat</title>

  <!-- ===================== CSS ===================== -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ---------- Login Screen ---------- */
    #login-screen {
      background: #1a1a2e;
      padding: 40px;
      border-radius: 16px;
      width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    #login-screen h1 {
      margin-bottom: 24px;
      font-size: 24px;
      color: #e0e0e0;
    }

    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 14px;
      border: none;
      border-radius: 8px;
      background: #16213e;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    #login-screen input::placeholder { color: #666; }

    #login-screen button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background .2s;
    }

    #login-screen button:hover { background: #533483; }

    #login-error {
      color: #ff6b6b;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }

    /* ---------- Chat Screen ---------- */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 480px;
      max-width: 100%;
      height: 90vh;
      background: #1a1a2e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    /* Header */
    #chat-header {
      padding: 16px 20px;
      background: #16213e;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #0f3460;
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* Message bubble */
    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .msg .sender {
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .msg .time {
      font-size: 11px;
      margin-top: 4px;
      opacity: .5;
      text-align: right;
    }

    /* Own messages — right side, blue */
    .msg.own {
      align-self: flex-end;
      background: #0f3460;
      border-bottom-right-radius: 2px;
    }

    /* Other messages — left side, gray */
    .msg.other {
      align-self: flex-start;
      background: #2a2a3e;
      border-bottom-left-radius: 2px;
    }

    /* ---------- Typing Indicator ---------- */
    #typing-indicator {
      padding: 4px 16px 8px;
      font-size: 13px;
      color: #888;
      font-style: italic;
      min-height: 24px;
    }

    /* Input bar */
    #input-bar {
      display: flex;
      padding: 12px;
      gap: 10px;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #1a1a2e;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    #msg-input::placeholder { color: #555; }

    #send-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: background .2s;
    }

    #send-btn:hover { background: #533483; }

    /* Responsive */
    @media (max-width: 520px) {
      #chat-screen { width: 100%; height: 100vh; border-radius: 0; }
      #login-screen { width: 90%; }
    }
  </style>
</head>
<body>

  <!-- ===================== LOGIN SCREEN ===================== -->
  <div id="login-screen">
    <h1>Web Sock</h1>
    <input type="text" id="username" placeholder="Your Name" autocomplete="off">
    <input type="password" id="accesscode" placeholder="Access Code" autocomplete="off">
    <button onclick="login()">Enter Chat</button>
    <p id="login-error">Invalid Code</p>
  </div>

  <!-- ===================== CHAT SCREEN ===================== -->
  <div id="chat-screen">
    <div id="chat-header">Chat</div>
    <div id="messages"></div>
    <div id="typing-indicator"></div>
    <div id="input-bar">
      <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- ===================== FIREBASE SDK (v9 compat CDN) ===================== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- ===================== JAVASCRIPT ===================== -->
  <script>
const firebaseConfig = {
  apiKey: "AIzaSyBCiAgS5OyDxxCfctPn41oMyBMHD3vof2Y",
  authDomain: "websock-8754c.firebaseapp.com",
  databaseURL: "https://websock-8754c-default-rtdb.firebaseio.com",
  projectId: "websock-8754c",
  storageBucket: "websock-8754c.firebasestorage.app",
  messagingSenderId: "795195450874",
  appId: "1:795195450874:web:6d3a2d61ef375cbdfff043",
  measurementId: "G-E6GGVD0X2S"
};
    // ============================================================

    // --- DEBUG: Warn if config is still placeholder ---
    if (firebaseConfig.apiKey === "YOUR_API_KEY" || !firebaseConfig.databaseURL || firebaseConfig.databaseURL.includes("YOUR_PROJECT")) {
      console.error("Firebase config is still placeholder! Replace it with your real config.");
      alert("Firebase is not configured. Open index.html and paste your Firebase config.");
    }

    // Initialize Firebase
    try {
      firebase.initializeApp(firebaseConfig);
      console.log("Firebase initialized successfully.");
    } catch (err) {
      console.error("Firebase initialization failed:", err);
    }

    const db = firebase.database();
    const messagesRef = db.ref("messages");
    const typingRef = db.ref("typing"); // Separate node for typing status

    // Predefined universal access code
    const ACCESS_CODE = "ABHI123";

    // Current user's name (set on login)
    let currentUser = "";

    // --- NOTIFICATION: Track message count to avoid alerting on old messages ---
    let initialLoadDone = false;

    // --- TYPING: Timer to auto-clear typing status after inactivity ---
    let typingTimeout = null;

    // ---------- Login ----------
    function login() {
      const name = document.getElementById("username").value.trim();
      const code = document.getElementById("accesscode").value.trim();
      const error = document.getElementById("login-error");

      if (!name) {
        error.textContent = "Please enter your name";
        error.style.display = "block";
        return;
      }

      if (code !== ACCESS_CODE) {
        error.textContent = "Invalid Code";
        error.style.display = "block";
        return;
      }

      // Success — switch to chat
      currentUser = name;
      console.log("Logged in as:", currentUser);
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      document.getElementById("chat-header").textContent = "Chat — " + currentUser;
      document.getElementById("msg-input").focus();

      // Start listening for messages and typing
      listenForMessages();
      listenForTyping();

      // --- TYPING: Detect typing on input field ---
      document.getElementById("msg-input").addEventListener("input", function () {
        // Set typing = true in Firebase for this user
        typingRef.child(currentUser).set(true);

        // Clear any previous timeout
        clearTimeout(typingTimeout);

        // After 1.5s of no typing, set typing = false
        typingTimeout = setTimeout(function () {
          typingRef.child(currentUser).set(false);
        }, 1500);
      });

      // Clean up typing status when user closes/leaves the page
      window.addEventListener("beforeunload", function () {
        typingRef.child(currentUser).set(false);
      });
    }

    // Allow Enter key to login
    document.getElementById("accesscode").addEventListener("keydown", function (e) {
      if (e.key === "Enter") login();
    });

    // ---------- Send Message ----------
    function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text) return;

      const msgData = {
        name: currentUser,
        text: text,
        timestamp: Date.now()
      };

      console.log("Sending message:", msgData);

      // --- TYPING: Clear typing status on send ---
      typingRef.child(currentUser).set(false);
      clearTimeout(typingTimeout);

      // Push message to Firebase — with error handling
      messagesRef.push(msgData)
        .then(function () {
          console.log("Message sent successfully.");
        })
        .catch(function (err) {
          console.error("Failed to send message:", err);
          alert("Failed to send message. Check console for details.");
        });

      // Clear input
      input.value = "";
      input.focus();
    }

    // Allow Enter key to send
    document.getElementById("msg-input").addEventListener("keydown", function (e) {
      if (e.key === "Enter") sendMessage();
    });

    // ---------- Listen for Messages (real-time) ----------
    function listenForMessages() {
      console.log("Listening for messages...");

      messagesRef.orderByChild("timestamp").on("value",
        // Success callback
        function (snapshot) {
          console.log("Snapshot received. Exists:", snapshot.exists(), "Children:", snapshot.numChildren());

          const container = document.getElementById("messages");
          container.innerHTML = "";

          if (!snapshot.exists()) {
            console.log("No messages yet.");
            return;
          }

          snapshot.forEach(function (child) {
            const msg = child.val();
            if (!msg || !msg.name || !msg.text) return; // skip malformed entries

            const isOwn = msg.name === currentUser;

            // Create message bubble
            const div = document.createElement("div");
            div.className = "msg " + (isOwn ? "own" : "other");

            // Sender name
            const sender = document.createElement("div");
            sender.className = "sender";
            sender.textContent = msg.name;

            // Message text
            const body = document.createElement("div");
            body.textContent = msg.text;

            // Timestamp
            const time = document.createElement("div");
            time.className = "time";
            time.textContent = new Date(msg.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit"
            });

            div.appendChild(sender);
            div.appendChild(body);
            div.appendChild(time);
            container.appendChild(div);
          });

          // --- NOTIFICATION: Alert for new messages from other users ---
          // Skip the first load so we don't alert on all existing messages
          if (!initialLoadDone) {
            initialLoadDone = true;
          } else {
            // Find the latest message (last child)
            let lastMsg = null;
            snapshot.forEach(function (child) { lastMsg = child.val(); });
            if (lastMsg && lastMsg.name !== currentUser) {
              alert("New message from " + lastMsg.name);
            }
          }

          // Auto-scroll to latest message
          container.scrollTop = container.scrollHeight;
        },
        // Error callback
        function (err) {
          console.error("Firebase listener error:", err);
          console.error("Check your database rules — they must allow read access.");
        }
      );
    }

    // ===================== TYPING INDICATOR =====================
    function listenForTyping() {
      typingRef.on("value", function (snapshot) {
        const typingDiv = document.getElementById("typing-indicator");
        const typers = [];

        snapshot.forEach(function (child) {
          // Show only OTHER users who are currently typing
          if (child.key !== currentUser && child.val() === true) {
            typers.push(child.key);
          }
        });

        if (typers.length > 0) {
          typingDiv.textContent = typers.join(", ") + (typers.length === 1 ? " is typing..." : " are typing...");
        } else {
          typingDiv.textContent = "";
        }
      });
    }
  </script>
</body>
</html>
