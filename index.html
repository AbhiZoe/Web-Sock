<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍆 Gutthi Vankaaya 🥬</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a2e1a;
      color: #f0f5e8;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "🍆🥦🌽🥕🌶️🥬🍅🥒🧄🧅";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: 40px;
      opacity: 0.06;
      word-spacing: 30px;
      line-height: 80px;
      letter-spacing: 20px;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      word-break: break-all;
    }

    #login-screen, #chat-screen {
      position: relative;
      z-index: 1;
    }

    #login-screen {
      background: #2d4a2d;
      padding: 40px;
      border-radius: 16px;
      width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      position: relative;
    }

    #login-screen h1 {
      margin-bottom: 24px;
      font-size: 24px;
      color: #c8e6c9;
    }

    .veggie-banner {
      font-size: 32px;
      margin-bottom: 16px;
      letter-spacing: 8px;
    }

    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 14px;
      border: none;
      border-radius: 8px;
      background: #1b3a1b;
      color: #f0f5e8;
      font-size: 15px;
      outline: none;
    }

    #login-screen input::placeholder { color: #666; }

    #login-screen button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #388e3c;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background .2s;
    }

    #login-screen button:hover { background: #2e7d32; }

    #login-error {
      color: #ff6b6b;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }

    #chat-screen {
      display: none;
      flex-direction: column;
      width: 480px;
      max-width: 100%;
      height: 90vh;
      background: #2d4a2d;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    #chat-header {
      padding: 16px 20px;
      background: #1b3a1b;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #388e3c;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #4a7a4a; border-radius: 3px; }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .msg .sender {
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .msg .time {
      font-size: 11px;
      margin-top: 4px;
      opacity: .5;
      text-align: right;
    }

    .msg.own {
      align-self: flex-end;
      background: #388e3c;
      border-bottom-right-radius: 2px;
    }

    .msg.other {
      align-self: flex-start;
      background: #3e5c3e;
      border-bottom-left-radius: 2px;
    }

    #typing-indicator {
      padding: 4px 16px 8px;
      font-size: 13px;
      color: #a5d6a7;
      font-style: italic;
      min-height: 24px;
    }

    #input-bar {
      display: flex;
      padding: 12px;
      gap: 10px;
      background: #1b3a1b;
      border-top: 1px solid #388e3c;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2d4a2d;
      color: #f0f5e8;
      font-size: 15px;
      outline: none;
    }

    #msg-input::placeholder { color: #555; }

    #send-btn, #mic-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #388e3c;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: background .2s;
    }

    #send-btn:hover, #mic-btn:hover { background: #2e7d32; }

    #mic-btn.recording {
      background: #e74c3c;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }

    #recording-status {
      display: none;
      padding: 6px 16px;
      background: #3a1a1a;
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      font-weight: 600;
    }

    .msg audio {
      width: 100%;
      max-width: 240px;
      height: 36px;
      margin-top: 4px;
    }

    .msg .reply-btn {
      font-size: 11px;
      color: #a5d6a7;
      cursor: pointer;
      margin-top: 4px;
      opacity: 0;
      transition: opacity .2s;
    }

    .msg:hover .reply-btn { opacity: 1; }

    .msg .reply-quote {
      background: rgba(0,0,0,.2);
      border-left: 3px solid #a5d6a7;
      padding: 4px 8px;
      margin-bottom: 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .msg .reply-quote .reply-name {
      font-weight: 700;
      color: #a5d6a7;
      font-size: 11px;
    }

    .msg .reply-quote .reply-text {
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    #reply-preview {
      display: none;
      padding: 8px 16px;
      background: #1b3a1b;
      border-left: 3px solid #a5d6a7;
      font-size: 13px;
      color: #c8e6c9;
      align-items: center;
      justify-content: space-between;
    }

    #reply-preview .reply-info {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex: 1;
    }

    #reply-preview .reply-info strong { color: #a5d6a7; }

    #reply-cancel {
      background: none;
      border: none;
      color: #ff6b6b;
      font-size: 18px;
      cursor: pointer;
      margin-left: 10px;
    }

    @media (max-width: 520px) {
      #chat-screen { width: 100%; height: 100vh; border-radius: 0; }
      #login-screen { width: 90%; }
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="veggie-banner">🥦🍆🌽🥕🌶️</div>
    <h1>🍆 Gutthi Vankaaya 🥬</h1>
    <input type="text" id="username" placeholder="🧑 Your Name" autocomplete="off">
    <input type="password" id="accesscode" placeholder="🔑 Access Code" autocomplete="off">
    <button onclick="login()">🌿 Enter Chat</button>
    <p id="login-error">Invalid Code</p>
  </div>

  <div id="chat-screen">
    <div id="chat-header">Chat</div>
    <div id="messages"></div>
    <div id="typing-indicator"></div>
    <div id="recording-status">🌶️ Recording...</div>
    <div id="reply-preview">
      <div class="reply-info">Replying to <strong id="reply-to-name"></strong>: <span id="reply-to-text"></span></div>
      <button id="reply-cancel" onclick="cancelReply()">✕</button>
    </div>
    <div id="input-bar">
      <input type="text" id="msg-input" placeholder="🥒 Type a message..." autocomplete="off">
      <button id="send-btn" onclick="sendMessage()">🌽 Send</button>
      <button id="mic-btn" onclick="toggleRecording()">🎙️</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBCiAgS5OyDxxCfctPn41oMyBMHD3vof2Y",
      authDomain: "websock-8754c.firebaseapp.com",
      databaseURL: "https://websock-8754c-default-rtdb.firebaseio.com",
      projectId: "websock-8754c",
      storageBucket: "websock-8754c.firebasestorage.app",
      messagingSenderId: "795195450874",
      appId: "1:795195450874:web:6d3a2d61ef375cbdfff043",
      measurementId: "G-E6GGVD0X2S"
    };

    if (firebaseConfig.apiKey === "YOUR_API_KEY" || !firebaseConfig.databaseURL || firebaseConfig.databaseURL.includes("YOUR_PROJECT")) {
      console.error("Firebase config is still placeholder! Replace it with your real config.");
      alert("Firebase is not configured. Open index.html and paste your Firebase config.");
    }

    try {
      firebase.initializeApp(firebaseConfig);
      console.log("Firebase initialized successfully.");
    } catch (err) {
      console.error("Firebase initialization failed:", err);
    }

    const db = firebase.database();
    const storage = firebase.storage();
    const messagesRef = db.ref("messages");
    const typingRef = db.ref("typing");

    const ACCESS_CODE = "ECHO123";

    let currentUser = "";
    let initialLoadDone = false;
    let typingTimeout = null;
    let replyingTo = null;

    function login() {
      const name = document.getElementById("username").value.trim();
      const code = document.getElementById("accesscode").value.trim();
      const error = document.getElementById("login-error");

      if (!name) {
        error.textContent = "Please enter your name";
        error.style.display = "block";
        return;
      }

      if (code !== ACCESS_CODE) {
        error.textContent = "Invalid Code";
        error.style.display = "block";
        return;
      }

      currentUser = name;
      console.log("Logged in as:", currentUser);
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      document.getElementById("chat-header").textContent = "🍆 Gutthi Vankaaya — " + currentUser + " 🥬";
      document.getElementById("msg-input").focus();

      listenForMessages();
      listenForTyping();

      document.getElementById("msg-input").addEventListener("input", function () {
        typingRef.child(currentUser).set(true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(function () {
          typingRef.child(currentUser).set(false);
        }, 1500);
      });

      window.addEventListener("beforeunload", function () {
        typingRef.child(currentUser).set(false);
      });
    }

    document.getElementById("accesscode").addEventListener("keydown", function (e) {
      if (e.key === "Enter") login();
    });

    function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text) return;

      const msgData = {
        name: currentUser,
        text: text,
        timestamp: Date.now()
      };

      if (replyingTo) {
        msgData.replyTo = {
          name: replyingTo.name,
          text: replyingTo.text || "🎙️ Voice note"
        };
        cancelReply();
      }

      typingRef.child(currentUser).set(false);
      clearTimeout(typingTimeout);

      messagesRef.push(msgData)
        .then(function () {
          console.log("Message sent successfully.");
        })
        .catch(function (err) {
          console.error("Failed to send message:", err);
          alert("Failed to send message. Check console for details.");
        });

      input.value = "";
      input.focus();
    }

    function setReply(name, text) {
      replyingTo = { name: name, text: text };
      document.getElementById("reply-to-name").textContent = name;
      document.getElementById("reply-to-text").textContent = text || "🎙️ Voice note";
      document.getElementById("reply-preview").style.display = "flex";
      document.getElementById("msg-input").focus();
    }

    function cancelReply() {
      replyingTo = null;
      document.getElementById("reply-preview").style.display = "none";
    }

    document.getElementById("msg-input").addEventListener("keydown", function (e) {
      if (e.key === "Enter") sendMessage();
    });

    function listenForMessages() {
      messagesRef.orderByChild("timestamp").on("value",
        function (snapshot) {
          const container = document.getElementById("messages");
          container.innerHTML = "";

          if (!snapshot.exists()) return;

          snapshot.forEach(function (child) {
            const msg = child.val();
            if (!msg || !msg.name) return;
            if (!msg.text && !msg.audio) return;

            const isOwn = msg.name === currentUser;

            const div = document.createElement("div");
            div.className = "msg " + (isOwn ? "own" : "other");

            const sender = document.createElement("div");
            sender.className = "sender";
            sender.textContent = msg.name;
            div.appendChild(sender);

            if (msg.replyTo) {
              const quote = document.createElement("div");
              quote.className = "reply-quote";
              const rName = document.createElement("div");
              rName.className = "reply-name";
              rName.textContent = msg.replyTo.name;
              const rText = document.createElement("div");
              rText.className = "reply-text";
              rText.textContent = msg.replyTo.text;
              quote.appendChild(rName);
              quote.appendChild(rText);
              div.appendChild(quote);
            }

            if (msg.audio) {
              const audio = document.createElement("audio");
              audio.controls = true;
              audio.src = msg.audio;
              div.appendChild(audio);
            } else {
              const body = document.createElement("div");
              body.textContent = msg.text;
              div.appendChild(body);
            }

            const time = document.createElement("div");
            time.className = "time";
            time.textContent = new Date(msg.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit"
            });

            div.appendChild(time);

            const replyBtn = document.createElement("div");
            replyBtn.className = "reply-btn";
            replyBtn.textContent = "↩ Reply";
            replyBtn.onclick = (function (m) {
              return function () { setReply(m.name, m.text || ""); };
            })(msg);
            div.appendChild(replyBtn);

            container.appendChild(div);
          });

          if (!initialLoadDone) {
            initialLoadDone = true;
          } else {
            let lastMsg = null;
            snapshot.forEach(function (child) { lastMsg = child.val(); });
            if (lastMsg && lastMsg.name !== currentUser) {
              alert("New message from " + lastMsg.name);
            }
          }

          container.scrollTop = container.scrollHeight;
        },
        function (err) {
          console.error("Firebase listener error:", err);
        }
      );
    }

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function (stream) {
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = function (e) {
            audioChunks.push(e.data);
          };

          mediaRecorder.onstop = function () {
            stream.getTracks().forEach(function (track) { track.stop(); });
            const blob = new Blob(audioChunks, { type: "audio/webm" });
            uploadVoiceNote(blob);
          };

          mediaRecorder.start();
          isRecording = true;

          document.getElementById("mic-btn").textContent = "🛑";
          document.getElementById("mic-btn").classList.add("recording");
          document.getElementById("recording-status").style.display = "block";
          document.getElementById("send-btn").disabled = true;
        })
        .catch(function (err) {
          console.error("Microphone access denied:", err);
          alert("Microphone permission is required to send voice notes.");
        });
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
      isRecording = false;

      document.getElementById("mic-btn").textContent = "🎙️";
      document.getElementById("mic-btn").classList.remove("recording");
      document.getElementById("recording-status").style.display = "none";
      document.getElementById("send-btn").disabled = false;
    }

    function uploadVoiceNote(blob) {
      const fileName = "voice_" + Date.now() + ".webm";
      const storageRef = storage.ref("voiceNotes/" + fileName);

      storageRef.put(blob)
        .then(function (snapshot) {
          return snapshot.ref.getDownloadURL();
        })
        .then(function (downloadURL) {
          messagesRef.push({
            name: currentUser,
            audio: downloadURL,
            timestamp: Date.now()
          });
        })
        .catch(function (err) {
          console.error("Voice note upload failed:", err);
          alert("Failed to upload voice note. Check console for details.");
        });
    }

    function listenForTyping() {
      typingRef.on("value", function (snapshot) {
        const typingDiv = document.getElementById("typing-indicator");
        const typers = [];

        snapshot.forEach(function (child) {
          if (child.key !== currentUser && child.val() === true) {
            typers.push(child.key);
          }
        });

        if (typers.length > 0) {
          typingDiv.textContent = typers.join(", ") + (typers.length === 1 ? " is typing..." : " are typing...");
        } else {
          typingDiv.textContent = "";
        }
      });
    }
  </script>
</body>
</html>
